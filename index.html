<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rivo Chat V16 - Username</title>
    
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* --- 1. MODERN BLUE THEME --- */
        :root {
            --primary: #2563eb;       /* Blue 600 */
            --primary-dark: #1d4ed8;  /* Blue 700 */
            --primary-light: #dbeafe; /* Blue 100 */
            --primary-bg: #eff6ff;    /* Blue 50 */
            
            --bg-main: #f8fafc;       /* Background */
            --surface: #ffffff;       /* Cards */
            --border: #e2e8f0;        /* Borders */
            
            --text-dark: #0f172a;
            --text-med: #64748b;
            --text-light: #94a3b8;

            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-float: 0 10px 30px -10px rgba(37, 99, 235, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-main); height: 100vh; overflow: hidden; display: flex; color: var(--text-dark); margin: 0; }
        .hidden { display: none !important; }
        .scroll-y { overflow-y: auto; flex: 1; min-height: 0; scrollbar-width: thin; }
        
        /* --- 2. LAYOUT --- */
        #app-container { display: none; width: 100%; height: 100%; }

        /* A. NAVIGASI PC (KIRI) */
        #nav-rail { width: 88px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; z-index: 20; }
        .nav-btn { width: 56px; height: 56px; border-radius: 18px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--text-light); cursor: pointer; transition: 0.3s; }
        .nav-btn:hover { background: var(--primary-bg); color: var(--primary); transform: translateY(-3px); }
        .nav-btn.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: var(--shadow-float); }

        /* B. LIST PANEL (TENGAH) */
        #list-panel { width: 380px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .panel-head { height: 80px; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 22px; flex-shrink: 0; letter-spacing: -0.5px; }
        .add-btn { width: 36px; height: 36px; background: var(--primary-bg); color: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .add-btn:hover { background: var(--primary); color: white; }

        .search-box { padding: 0 24px 20px; }
        .inp-search { width: 100%; padding: 14px 20px; background: var(--bg-main); border: 2px solid transparent; border-radius: 16px; font-size: 14px; font-weight: 500; transition: 0.3s; }
        .inp-search:focus { background: white; border-color: var(--primary-light); box-shadow: var(--shadow-sm); }

        .list-item { padding: 14px 20px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; margin: 4px 12px; border-radius: 16px; }
        .list-item:hover { background: var(--bg-main); }
        .avatar { width: 52px; height: 52px; border-radius: 18px; background: var(--primary-light); margin-right: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--primary); flex-shrink: 0; font-weight: 700; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .item-info { flex: 1; overflow: hidden; }
        .item-name { font-weight: 700; font-size: 15px; color: var(--text-dark); margin-bottom: 2px; }
        .item-sub { font-size: 13px; color: var(--text-med); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }

        /* C. CHAT PANEL (KANAN) */
        #chat-panel { flex: 1; background: var(--bg-main); display: flex; flex-direction: column; position: relative; }
        #empty-state { height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-light); flex-direction: column; gap: 15px; }
        #active-chat { height: 100%; display: flex; flex-direction: column; }
        
        .chat-head { height: 80px; padding: 0 24px; display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.85); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .back-btn { display: none; font-size: 28px; cursor: pointer; color: var(--text-dark); }
        
        .msgs-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 70%; padding: 12px 18px; border-radius: 20px; font-size: 15px; position: relative; box-shadow: var(--shadow-sm); line-height: 1.5; }
        .me { align-self: flex-end; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2); }
        .other { align-self: flex-start; background: white; color: var(--text-dark); border-bottom-left-radius: 4px; }
        .bubble-name { font-size: 11px; font-weight: 700; color: var(--primary); margin-bottom: 4px; display: block; }

        .input-bar { padding: 20px 24px; background: rgba(255,255,255,0.85); backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: flex; gap: 12px; align-items: center; }
        .inp-chat { flex: 1; padding: 14px 20px; border-radius: 99px; background: var(--bg-main); border: 2px solid transparent; outline: none; font-size: 15px; transition: 0.3s; }
        .inp-chat:focus { background: white; border-color: var(--primary-light); }
        
        .btn-send { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 22px; box-shadow: var(--shadow-float); transition: 0.3s; }
        .btn-send:hover { transform: scale(1.05); }

        /* D. NAVIGASI HP (BAWAH) */
        #mobile-nav { display: none; }
        
        @media (max-width: 800px) {
            #nav-rail { display: none; } /* Sembunyikan Nav Kiri */
            #list-panel { width: 100%; border-right: none; }
            
            /* TAMPILKAN NAV BAWAH */
            #mobile-nav { display: flex; height: 75px; position: fixed; bottom: 0; width: 100%; background: var(--surface); border-top: 1px solid var(--border); z-index: 50; justify-content: space-around; align-items: center; padding-bottom: 10px; box-shadow: 0 -5px 20px rgba(0,0,0,0.03); }
            
            .mob-item { display: flex; flex-direction: column; align-items: center; color: var(--text-light); font-size: 11px; font-weight: 600; padding: 6px 16px; border-radius: 12px; transition: 0.3s; }
            .mob-item i { font-size: 24px; margin-bottom: 4px; }
            .mob-item.active { color: var(--primary); background: var(--primary-bg); }

            #chat-panel { position: fixed; inset: 0; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 60; background: var(--bg-main); }
            #chat-panel.show { transform: translateX(0); }
            .back-btn { display: block; }
            #empty-state { display: none; }
        }

        /* MODALS */
        .modal-bg { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: center; justify-content: center; }
        .modal { background: var(--surface); width: 90%; max-width: 380px; border-radius: 24px; padding: 32px; display: flex; flex-direction: column; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.2); }
        .inp-log { width: 100%; padding: 14px 20px; border: 2px solid var(--border); border-radius: 16px; margin-bottom: 15px; font-size: 15px; outline: none; transition: 0.3s; background: var(--bg-main); }
        .inp-log:focus { border-color: var(--primary); background: white; }
        .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; font-size: 15px; box-shadow: var(--shadow-float); transition: 0.2s; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-google { width: 100%; padding: 12px; background: white; border: 1px solid var(--border); border-radius: 16px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; margin-bottom: 20px; transition: 0.2s; color: var(--text-dark); }
    </style>
</head>
<body>

    <div id="overlay-login" class="modal-bg">
        <div class="modal" style="text-align: center;">
            <i class='bx bxs-message-square-dots' style="font-size: 56px; color: var(--primary); margin-bottom: 10px;"></i>
            <h2 style="margin:0 0 5px; font-weight:800; color:var(--text-dark);">Rivo Chat</h2>
            <p style="color:var(--text-med); margin-bottom:30px;">Masuk dengan Username</p>
            
            <button class="btn-google" onclick="app.loginGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                Lanjut dengan Google
            </button>
            <div style="display:flex;align-items:center;color:var(--text-light);font-size:12px;margin-bottom:20px;gap:10px;">
                <div style="flex:1;height:1px;background:var(--border)"></div>ATAU<div style="flex:1;height:1px;background:var(--border)"></div>
            </div>
            
            <input id="username-inp" class="inp-log" placeholder="Buat Username (tanpa spasi)...">
            <button class="btn-primary" onclick="app.loginManual()">Masuk</button>
        </div>
    </div>

    <div id="app-container">
        
        <div id="nav-rail">
            <div class="nav-btn active" onclick="app.tab('chats', this)"><i class='bx bxs-message-rounded-dots'></i></div>
            <div class="nav-btn" onclick="app.tab('groups', this)"><i class='bx bxs-group'></i></div>
            <div class="nav-btn" onclick="app.tab('channels', this)"><i class='bx bxs-megaphone'></i></div>
            <div style="flex:1"></div>
            <div class="nav-btn" onclick="app.logout()" style="color:#ef4444; background:#fef2f2;"><i class='bx bx-power-off'></i></div>
        </div>

        <div id="list-panel">
            
            <div id="view-chats" class="flex-col" style="height:100%; display:flex; flex-direction:column;">
                <div class="panel-head">Pesan</div>
                <div class="search-box">
                    <input id="search-chat" class="inp-search" placeholder="Cari Username teman..." onkeypress="if(event.key==='Enter') app.searchUser()">
                </div>
                <div id="list-chats" class="scroll-y" style="padding:0 12px;"></div>
            </div>

            <div id="view-groups" class="hidden" style="height:100%; display:flex; flex-direction:column;">
                <div class="panel-head">Grup <div class="add-btn" onclick="app.openCreateModal('group')"><i class='bx bx-plus'></i></div></div>
                <div id="list-groups" class="scroll-y" style="padding:0 12px;"></div>
            </div>

            <div id="view-channels" class="hidden" style="height:100%; display:flex; flex-direction:column;">
                <div class="panel-head">Saluran <div class="add-btn" onclick="app.openCreateModal('channel')"><i class='bx bx-plus'></i></div></div>
                <div id="list-channels" class="scroll-y" style="padding:0 12px;"></div>
            </div>
        </div>

        <div id="chat-panel">
            <div id="empty-state">
                <i class='bx bxs-chat' style="font-size:80px; color:var(--primary-light);"></i>
                <h3 style="margin:0;">Pilih obrolan</h3>
            </div>
            <div id="active-chat" class="hidden">
                <div class="chat-head">
                    <i class='bx bx-chevron-left back-btn' onclick="app.closeChat()"></i>
                    <div class="avatar" id="head-ava" style="width:40px; height:40px; border-radius:12px;">?</div>
                    <div style="flex:1">
                        <div id="head-name" style="font-weight:800; font-size:16px;">User</div>
                        <div id="head-desc" style="font-size:12px; color:var(--text-med); font-weight:500;">Online</div>
                    </div>
                </div>
                <div id="msgs-area" class="msgs-area"></div>
                <div class="input-bar">
                    <input id="msg-in" class="inp-chat" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter') app.send()">
                    <button onclick="app.send()" class="btn-send"><i class='bx bxs-send'></i></button>
                </div>
            </div>
        </div>

        <div id="mobile-nav">
            <div class="mob-item active" onclick="app.tab('chats', this)"><i class='bx bxs-message-rounded-dots'></i>Chat</div>
            <div class="mob-item" onclick="app.tab('groups', this)"><i class='bx bxs-group'></i>Grup</div>
            <div class="mob-item" onclick="app.tab('channels', this)"><i class='bx bxs-megaphone'></i>Saluran</div>
            <div class="mob-item" onclick="app.logout()" style="color:#ef4444;"><i class='bx bx-power-off'></i>Keluar</div>
        </div>
    </div>

    <div id="modal-create" class="modal-bg hidden">
        <div class="modal">
            <h3 style="margin-top:0;" id="create-title">Buat Baru <span style="float:right;cursor:pointer" onclick="app.modal('create', false)">&times;</span></h3>
            <input id="new-gname" class="inp-log" placeholder="Nama Grup/Saluran...">
            <p style="font-size:12px; font-weight:bold; margin-bottom:5px;">Tambah Anggota (Username):</p>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input id="add-mem-inp" class="inp-log" style="margin:0;" placeholder="Username...">
                <button class="btn-primary" style="width:auto; padding:0 20px;" onclick="app.addMemberToDraft()">Add</button>
            </div>
            <div id="draft-members" style="display:flex; gap:5px; flex-wrap:wrap; margin-bottom:15px;"></div>
            <button class="btn-primary" onclick="app.createAction()">Selesai</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, onSnapshot, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // 🔴 PASTE CONFIG KAMU DI SINI 👇
        const firebaseConfig = {
            apiKey: "AIzaSyC70M2KvsPNjF7yG14FQWB052g5pW-mP7E",
            authDomain: "chat-rivo.firebaseapp.com",
            projectId: "chat-rivo",
            storageBucket: "chat-rivo.firebasestorage.app",
            messagingSenderId: "1089721856706",
            appId: "1:1089721856706:web:235f8070bde6becaca815b",
            measurementId: "G-B36Q39C3E0"
        };

        const fApp = initializeApp(firebaseConfig);
        const db = getFirestore(fApp);
        const auth = getAuth(fApp);
        const provider = new GoogleAuthProvider();

        window.app = {
            user: null, chatId: null, isGrp: false, createType: 'group', draftMems: [],

            // --- 1. LOGIN SYSTEM (USERNAME + GOOGLE) ---
            loginManual: async () => {
                const u = document.getElementById('username-inp').value.trim().toLowerCase().replace(/\s/g, '');
                if(!u) return alert("Username wajib diisi!");
                app.handleLogin({ email: u, displayName: u, isManual: true });
            },
            loginGoogle: () => {
                signInWithPopup(auth, provider).then(res => {
                    app.handleLogin({ email: res.user.email, displayName: res.user.displayName, photoURL: res.user.photoURL });
                }).catch(e => alert(e.message));
            },
            handleLogin: async (u) => {
                // ID User = Email (Google) ATAU Username (Manual)
                app.user = u.email;
                localStorage.setItem('rivo_v16_user', app.user);
                
                const ref = doc(db, "users", app.user);
                const snap = await getDoc(ref);
                
                if(!snap.exists()) {
                    await setDoc(ref, { 
                        email: u.email, 
                        name: u.displayName, 
                        avatar: u.photoURL || null, 
                        chats: [], groups: [] 
                    });
                }
                
                document.getElementById('overlay-login').classList.add('hidden');
                document.getElementById('app-container').style.display = 'flex';
                app.tab('chats', document.querySelector('.nav-btn'));
            },
            logout: () => { localStorage.removeItem('rivo_v16_user'); location.reload(); },

            // --- 2. NAVIGATION ---
            tab: (t, el) => {
                // Reset Active Class
                document.querySelectorAll('.nav-btn, .mob-item').forEach(x => x.classList.remove('active'));
                
                // Set Active (PC & Mobile)
                if(el) {
                    const idx = ['chats','groups','channels'].indexOf(t);
                    if(idx !== -1) {
                        document.querySelectorAll('.nav-btn')[idx].classList.add('active');
                        document.querySelectorAll('.mob-item')[idx].classList.add('active');
                    }
                }
                
                ['view-chats','view-groups','view-channels'].forEach(id => document.getElementById(id).classList.add('hidden'));
                document.getElementById('view-'+t).classList.remove('hidden');

                if(t==='chats') app.listenChats();
                else app.listenGroups(t); // t = 'groups' or 'channels'
            },

            // --- 3. LISTS ---
            listenChats: () => {
                onSnapshot(doc(db, "users", app.user), (d) => {
                    const list = document.getElementById('list-chats'); list.innerHTML="";
                    const data = d.data();
                    if(data?.chats) data.chats.forEach(async c => {
                        const p = (await getDoc(doc(db, "users", c.id))).data();
                        app.renderItem(list, p.name, "Chat Pribadi", p.avatar, () => app.openChat(c.chatId, c.id, false));
                    });
                });
            },
            listenGroups: (type) => { // type: 'groups' or 'channels'
                const targetId = type === 'groups' ? 'list-groups' : 'list-channels';
                onSnapshot(doc(db, "users", app.user), (d) => {
                    const list = document.getElementById(targetId); list.innerHTML="";
                    const data = d.data();
                    if(data?.groups) data.groups.forEach(async g => {
                        const gSnap = await getDoc(doc(db, "groups", g.id));
                        if(gSnap.exists()) {
                            const gd = gSnap.data();
                            const gType = gd.type || 'group';
                            // Filter logic: Show group in Groups tab, channel in Channels tab
                            if((type === 'groups' && gType === 'group') || (type === 'channels' && gType === 'channel')) {
                                app.renderItem(list, gd.name, type==='groups'?`${gd.members.length} Anggota`:'Broadcast', gd.avatar, () => app.openChat(g.id, g.id, true));
                            }
                        }
                    });
                });
            },
            renderItem: (cont, name, sub, img, onClick) => {
                const d = document.createElement('div'); d.className='list-item';
                const ava = img ? `<img src="${img}">` : name[0].toUpperCase();
                d.innerHTML = `<div class="avatar">${ava}</div><div class="item-info"><div class="item-name">${name}</div><div class="item-sub">${sub}</div></div>`;
                d.onclick = onClick; cont.appendChild(d);
            },

            // --- 4. CHAT LOGIC ---
            searchUser: async () => {
                const t = document.getElementById('search-chat').value.trim().toLowerCase();
                if(t===app.user) return;
                const s = await getDoc(doc(db, "users", t));
                if(s.exists()) {
                    const cid = [app.user, t].sort().join("_");
                    await updateDoc(doc(db, "users", app.user), { chats: arrayUnion({id:t, chatId:cid}) });
                    await updateDoc(doc(db, "users", t), { chats: arrayUnion({id:app.user, chatId:cid}) });
                    app.openChat(cid, t, false); document.getElementById('search-chat').value="";
                } else alert("Username tidak ditemukan");
            },
            openChat: async (cid, tid, isGrp) => {
                app.chatId = cid; app.isGrp = isGrp;
                document.getElementById('empty-state').classList.add('hidden');
                document.getElementById('active-chat').classList.remove('hidden');
                document.getElementById('chat-panel').classList.add('show');
                
                const nEl = document.getElementById('head-name');
                const sEl = document.getElementById('head-desc');
                const aEl = document.getElementById('head-ava');

                if(isGrp) {
                    const g = (await getDoc(doc(db, "groups", tid))).data();
                    nEl.innerText = g.name; sEl.innerText = g.type === 'channel' ? 'Saluran' : `${g.members.length} Anggota`;
                    aEl.innerHTML = g.avatar ? `<img src="${g.avatar}">` : (g.type==='channel' ? `<i class='bx bxs-megaphone'></i>` : `<i class='bx bxs-group'></i>`);
                } else {
                    const p = (await getDoc(doc(db, "users", tid))).data();
                    nEl.innerText = p.name; sEl.innerText = "Online";
                    aEl.innerHTML = p.avatar ? `<img src="${p.avatar}">` : `<i class='bx bxs-user'></i>`;
                }

                onSnapshot(collection(db, "chats", cid, "messages"), (snap) => {
                    const box = document.getElementById('msgs-area'); box.innerHTML="";
                    let msgs = []; snap.forEach(d => msgs.push(d.data()));
                    msgs.sort((a,b)=>a.time-b.time);
                    msgs.forEach(m => {
                        const me = m.sender===app.user;
                        const d = document.createElement('div'); d.className=`bubble ${me?'me':'other'}`;
                        const snd = (!me && app.isGrp) ? `<span class="bubble-name">${m.senderName}</span>` : '';
                        d.innerHTML = `${snd}${m.text}`;
                        box.appendChild(d);
                    });
                    box.scrollTop = box.scrollHeight;
                });
            },
            closeChat: () => document.getElementById('chat-panel').classList.remove('show'),
            send: async () => {
                const i = document.getElementById('msg-in'); const t=i.value.trim();
                if(!t || !app.chatId) return;
                const u = (await getDoc(doc(db, "users", app.user))).data();
                await addDoc(collection(db, "chats", app.chatId, "messages"), { sender:app.user, senderName:u.name, text:t, time:Date.now() });
                i.value="";
            },

            // --- 5. MANAGEMENT ---
            openCreateModal: (type) => {
                app.createType = type; app.draftMems = [app.user];
                document.getElementById('create-title').innerHTML = `Buat ${type==='group'?'Grup':'Saluran'} <span style="float:right;cursor:pointer" onclick="app.modal('create',false)">&times;</span>`;
                document.getElementById('draft-members').innerHTML=""; app.modal('create', true);
            },
            addMemberToDraft: () => {
                const e = document.getElementById('add-mem-inp').value.trim().toLowerCase();
                if(e && !app.draftMems.includes(e)) {
                    app.draftMems.push(e);
                    const chip = document.createElement('div'); chip.className='chip';
                    chip.innerHTML = `${e} <i class='bx bx-x' style="cursor:pointer" onclick="this.parentElement.remove()"></i>`;
                    document.getElementById('draft-members').appendChild(chip);
                    document.getElementById('add-mem-inp').value="";
                }
            },
            createAction: async () => {
                const n = document.getElementById('new-gname').value; if(!n) return alert("Nama wajib!");
                const gRef = await addDoc(collection(db, "groups"), { name:n, admin:app.user, members:app.draftMems, avatar:null, type:app.createType });
                app.draftMems.forEach(async m => {
                    const uSnap = await getDoc(doc(db, "users", m));
                    if(uSnap.exists()) await updateDoc(doc(db, "users", m), { groups: arrayUnion({id: gRef.id}) });
                });
                app.modal('create', false); alert("Berhasil dibuat!");
            },
            modal: (id, show) => document.getElementById('modal-'+id).classList[show?'remove':'add']('hidden')
        };

        const saved = localStorage.getItem('rivo_v16_user'); if(saved) { app.user = saved; document.getElementById('overlay-login').classList.add('hidden'); document.getElementById('app-container').style.display='flex'; app.tab('chats', document.querySelector('.nav-btn')); }
    </script>
</body>
