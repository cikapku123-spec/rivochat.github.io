<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rivo Chat Platinum</title>
    
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- 1. DESIGN SYSTEM --- */
        :root {
            --primary: #2563eb;
            --primary-bg: #eff6ff;
            --bg-body: #f8fafc;
            --white: #ffffff;
            --text-dark: #0f172a;
            --text-grey: #64748b;
            --border: #e2e8f0;
            --nav-w: 80px;
            --list-w: 360px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; display: flex; color: var(--text-dark); }
        .hidden { display: none !important; }
        .scroll-y { overflow-y: auto; scrollbar-width: thin; }
        
        /* --- 2. LOGIN (MODERN GLASS) --- */
        #login-overlay {
            position: fixed; inset: 0; z-index: 999;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 24px; width: 90%; max-width: 400px;
            text-align: center; border: 1px solid rgba(255,255,255,0.1); color: white;
        }
        .inp-log { width: 100%; padding: 14px; border-radius: 12px; border: none; margin-bottom: 15px; background: rgba(255,255,255,0.9); font-family: inherit; }
        .btn-log { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-log:hover { background: #1d4ed8; transform: translateY(-2px); }

        /* --- 3. LAYOUT --- */
        #app { display: none; width: 100%; height: 100%; }

        /* A. Sidebar Nav (Kiri) */
        #nav-rail {
            width: var(--nav-w); background: var(--white); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 20;
        }
        .nav-btn {
            width: 48px; height: 48px; border-radius: 14px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            color: var(--text-grey); cursor: pointer; transition: 0.2s; position: relative;
        }
        .nav-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .nav-btn:hover:not(.active) { background: var(--primary-bg); color: var(--primary); }

        /* B. List Panel (Tengah) */
        #list-panel {
            width: var(--list-w); background: var(--white); border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
        }
        .panel-head { height: 70px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; font-weight: 700; font-size: 20px; border-bottom: 1px solid var(--border); }
        .search-wrap { padding: 16px; }
        .search-box {
            background: var(--bg-body); border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 10px;
        }
        .search-box input { border: none; background: transparent; width: 100%; outline: none; font-size: 14px; }

        /* LIST ITEM STYLE */
        .list-item { padding: 12px 20px; display: flex; align-items: center; cursor: pointer; border-bottom: 1px solid transparent; transition: 0.2s; border-radius: 12px; margin: 0 10px; }
        .list-item:hover { background: var(--bg-body); }
        .list-item.active { background: var(--primary-bg); }
        
        .avatar {
            width: 50px; height: 50px; border-radius: 14px; background: #e2e8f0; flex-shrink: 0;
            margin-right: 15px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 700; color: #64748b; overflow: hidden; position: relative;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .type-badge { position: absolute; bottom: 0; right: 0; font-size: 14px; background: white; border-radius: 50%; padding: 2px; }

        .item-info { flex: 1; overflow: hidden; }
        .item-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .item-name { font-weight: 600; font-size: 15px; color: var(--text-dark); }
        .item-role { font-size: 10px; background: #e0f2fe; color: #0284c7; padding: 2px 6px; border-radius: 6px; font-weight: 600; }
        .item-desc { font-size: 13px; color: var(--text-grey); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* C. Chat Room (Kanan) */
        #chat-room {
            flex: 1; background: #ffffff; display: flex; flex-direction: column; position: relative;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 24px 24px;
        }
        
        #empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-grey); }
        #active-chat { display: flex; flex-direction: column; height: 100%; }
        
        .chat-head {
            height: 70px; background: rgba(255,255,255,0.95); backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--border); padding: 0 24px;
            display: flex; align-items: center; gap: 15px; flex-shrink: 0;
        }
        .back-btn { display: none; font-size: 24px; cursor: pointer; }

        .msgs-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 10px; }
        
        .bubble { max-width: 65%; padding: 12px 16px; border-radius: 16px; font-size: 15px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .other { align-self: flex-start; background: white; color: var(--text-dark); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        
        .sender-name { font-size: 11px; font-weight: 700; color: #d97706; margin-bottom: 4px; display: block; }
        .msg-time { font-size: 10px; opacity: 0.7; text-align: right; margin-top: 4px; display: block; }

        .input-bar {
            padding: 20px; background: white; border-top: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }
        .inp-chat { flex: 1; padding: 14px 20px; border-radius: 24px; background: var(--bg-body); border: 1px solid transparent; outline: none; }
        .btn-icon { font-size: 24px; color: var(--text-grey); cursor: pointer; background: none; border: none; }
        .btn-send { background: var(--primary); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* BUTTONS */
        .btn-action { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-explore { background: #f1f5f9; color: var(--text-dark); border: 1px solid var(--border); }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 800px) {
            #nav-rail { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; flex-direction: row; justify-content: space-around; padding: 0; border-top: 1px solid var(--border); border-right: none; }
            .nav-btn { width: auto; height: 100%; margin: 0; border-radius: 0; flex: 1; box-shadow: none !important; }
            .nav-btn.active { color: var(--primary); background: transparent; border-top: 3px solid var(--primary); }
            
            #list-panel { width: 100%; height: calc(100% - 60px); border-right: none; }
            
            #chat-room { position: fixed; inset: 0; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; }
            #chat-room.show { transform: translateX(0); }
            .back-btn { display: block; }
            #empty-state { display: none; }
            #active-chat { display: flex; height: 100%; }
        }

        /* --- MODALS --- */
        .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: white; width: 90%; max-width: 400px; border-radius: 20px; padding: 24px; animation: popUp 0.3s; display: flex; flex-direction: column; max-height: 80vh; }
        @keyframes popUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-head { display: flex; justify-content: space-between; align-items: center; font-weight: 700; margin-bottom: 20px; }
        
        .com-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #f1f5f9; }
        .com-btn { padding: 6px 12px; font-size: 12px; background: var(--primary-bg); color: var(--primary); border: none; border-radius: 20px; cursor: pointer; font-weight: 700; }

    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h1 style="margin-bottom: 10px;">Rivo Chat</h1>
            <p style="opacity: 0.8; margin-bottom: 30px;">Platinum Edition</p>
            <input type="email" id="email" class="inp-log" placeholder="Masukkan Email Anda">
            <button class="btn-log" onclick="app.login()">MASUK</button>
        </div>
    </div>

    <div id="app">
        <nav id="nav-rail">
            <div class="nav-btn active" onclick="app.tab('chats', this)" title="Chat & Grup"><i class='bx bxs-message-dots'></i></div>
            <div class="nav-btn" onclick="app.tab('community', this)" title="Komunitas / Saluran"><i class='bx bxs-planet'></i></div>
            <div class="nav-btn" onclick="app.tab('profile', this)" title="Pengaturan"><i class='bx bxs-cog'></i></div>
            <div style="flex:1"></div>
            <div class="nav-btn" onclick="app.logout()" style="color:#ef4444"><i class='bx bx-power-off'></i></div>
        </nav>

        <div id="list-panel">
            
            <div id="view-chats" class="flex-col full-h">
                <div class="panel-head">
                    <span>Pesan</span>
                    <i class='bx bxs-edit' style="cursor:pointer; color:var(--primary)" onclick="app.openModal('create-group')"></i>
                </div>
                <div class="search-wrap">
                    <div class="search-box">
                        <i class='bx bx-search' style="color:#94a3b8"></i>
                        <input id="search-chat" placeholder="Cari teman atau grup..." onkeypress="if(event.key==='Enter') app.searchUser()">
                    </div>
                </div>
                <div id="list-chats" class="scroll-y" style="flex:1; padding-bottom: 10px;"></div>
            </div>

            <div id="view-community" class="flex-col full-h hidden">
                <div class="panel-head">Komunitas</div>
                <div style="padding:16px; border-bottom: 1px solid var(--border);">
                    <button class="btn-action btn-explore" onclick="app.openModal('explore')">
                        <i class='bx bx-globe'></i> Temukan Saluran Baru
                    </button>
                    <button class="btn-action" onclick="app.openModal('create-channel')" style="margin-top: 10px;">
                        <i class='bx bx-plus'></i> Buat Saluran
                    </button>
                </div>
                <div style="padding: 10px 20px; font-size: 12px; font-weight: 700; color: var(--text-grey); text-transform: uppercase;">Saluran Saya</div>
                <div id="list-community" class="scroll-y" style="flex:1"></div>
            </div>

            <div id="view-profile" class="flex-col full-h hidden">
                <div class="panel-head">Profil Saya</div>
                <div style="padding:40px 20px; text-align:center;">
                    <div class="avatar" style="width:100px; height:100px; margin:0 auto 20px; font-size:40px; cursor:pointer;" onclick="document.getElementById('file-p').click()">
                        <div id="my-ava-big">?</div>
                    </div>
                    <input type="file" id="file-p" class="hidden" accept="image/*" onchange="app.uploadProfile(this)">
                    
                    <input id="edit-name" class="inp-log" style="background:#f1f5f9; border:1px solid #e2e8f0; color:#333;" placeholder="Nama">
                    <input id="edit-bio" class="inp-log" style="background:#f1f5f9; border:1px solid #e2e8f0; color:#333;" placeholder="Bio">
                    <button class="btn-log" onclick="app.saveProfile()">Simpan Perubahan</button>
                </div>
            </div>
        </div>

        <div id="chat-room">
            <div id="empty-state">
                <i class='bx bxs-chat' style="font-size: 80px; color: #cbd5e1; margin-bottom: 20px;"></i>
                <h2>Mulai Percakapan</h2>
                <p>Pilih chat dari kiri atau cari teman baru.</p>
            </div>

            <div id="active-chat" class="hidden">
                <div class="chat-head">
                    <i class='bx bx-arrow-back back-btn' onclick="app.closeChat()"></i>
                    <div class="avatar" style="width:40px; height:40px;" id="head-ava">?</div>
                    <div style="flex:1; cursor:pointer;" onclick="app.viewInfo()">
                        <div style="font-weight:bold;" id="head-name">Nama</div>
                        <div style="font-size:12px; color:var(--text-grey);" id="head-desc">Detail</div>
                    </div>
                </div>

                <div class="msgs-area" id="msgs-area"></div>

                <div class="input-bar" id="input-bar">
                    <button class="btn-icon" onclick="document.getElementById('file-m').click()"><i class='bx bx-image'></i></button>
                    <input type="file" id="file-m" class="hidden" accept="image/*" onchange="app.sendImg(this)">
                    <input id="msg-in" class="inp-chat" placeholder="Tulis pesan..." onkeypress="if(event.key==='Enter') app.send()">
                    <button class="btn-send" onclick="app.send()"><i class='bx bxs-send'></i></button>
                </div>
                <div id="read-only-bar" class="hidden" style="padding:15px; text-align:center; background:#f8fafc; color:#64748b; font-weight:600; border-top:1px solid #e2e8f0;">
                    Hanya admin yang dapat mengirim pesan.
                </div>
            </div>
        </div>
    </div>

    <div id="modal-create-group" class="modal-bg hidden">
        <div class="modal-box">
            <div class="modal-head">Buat Grup Diskusi <i class='bx bx-x' style="cursor:pointer" onclick="app.closeModal('create-group')"></i></div>
            <input id="g-name" class="inp-log" style="background:#f1f5f9; color:#333; border:1px solid #ddd;" placeholder="Nama Grup">
            <button class="btn-log" onclick="app.createGroup('group')">Buat Grup</button>
        </div>
    </div>

    <div id="modal-create-channel" class="modal-bg hidden">
        <div class="modal-box">
            <div class="modal-head">Buat Saluran Baru <i class='bx bx-x' style="cursor:pointer" onclick="app.closeModal('create-channel')"></i></div>
            <input id="c-name" class="inp-log" style="background:#f1f5f9; color:#333; border:1px solid #ddd;" placeholder="Nama Saluran">
            <button class="btn-log" onclick="app.createGroup('channel')">Buat Saluran</button>
        </div>
    </div>

    <div id="modal-explore" class="modal-bg hidden">
        <div class="modal-box">
            <div class="modal-head">Cari Saluran <i class='bx bx-x' style="cursor:pointer" onclick="app.closeModal('explore')"></i></div>
            <div id="explore-list" class="scroll-y" style="flex:1;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, onSnapshot, collection, addDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // 🔴 PASTE CONFIG FIREBASE KAMU DI SINI 👇
        const firebaseConfig = {
            apiKey: "AIzaSyC70M2KvsPNjF7yG14FQWB052g5pW-mP7E",
            authDomain: "chat-rivo.firebaseapp.com",
            projectId: "chat-rivo",
            storageBucket: "chat-rivo.firebasestorage.app",
            messagingSenderId: "1089721856706",
            appId: "1:1089721856706:web:235f8070bde6becaca815b",
            measurementId: "G-B36Q39C3E0"
        };

        const fApp = initializeApp(firebaseConfig);
        const db = getFirestore(fApp);

        window.app = {
            user: null, chatId: null, isGrp: false,
            
            // AUTH
            login: async () => {
                const e = document.getElementById('email').value.trim().toLowerCase();
                if(!e) return alert("Email wajib");
                app.user = e; localStorage.setItem('rivo_plat_user', e);
                const ref = doc(db, "users", e);
                const snap = await getDoc(ref);
                if(!snap.exists()) await setDoc(ref, { email:e, name:e.split('@')[0], bio:"Halo!", avatar:null, chats:[], groups:[] });
                
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('app').style.display = 'flex';
                app.tab('chats', document.querySelector('.nav-btn'));
            },
            logout: () => { localStorage.removeItem('rivo_plat_user'); location.reload(); },

            // TABS
            tab: (t, el) => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                if(el) el.classList.add('active');
                ['view-chats','view-community','view-profile'].forEach(id => document.getElementById(id).classList.add('hidden'));
                document.getElementById('view-'+t).classList.remove('hidden');

                if(t==='chats') app.listenChats(); // Tab 1: Chat + Grup
                if(t==='community') app.listenCommunities(); // Tab 2: Channel Only
                if(t==='profile') app.loadProfile();
            },

            // --- LOGIC UTAMA: PEMISAHAN LIST ---
            listenChats: () => {
                // List Chat Pribadi + Grup Biasa
                onSnapshot(doc(db, "users", app.user), async (d) => {
                    const list = document.getElementById('list-chats'); list.innerHTML="";
                    const data = d.data();
                    
                    // 1. Render Private Chats
                    if(data && data.chats) {
                        data.chats.forEach(async c => {
                            const pSnap = await getDoc(doc(db, "users", c.id));
                            if(pSnap.exists()) {
                                const p = pSnap.data();
                                app.renderItem(list, p.name, p.bio, p.avatar, null, () => app.openChat(c.chatId, c.id, false));
                            }
                        });
                    }
                    
                    // 2. Render Normal Groups (Not Channels)
                    if(data && data.groups) {
                        data.groups.forEach(async g => {
                            const gSnap = await getDoc(doc(db, "groups", g.id));
                            if(gSnap.exists()) {
                                const gd = gSnap.data();
                                if(gd.type === 'group') { // HANYA GRUP BIASA
                                    app.renderItem(list, gd.name, "Grup Diskusi", gd.avatar, 'bx-group', () => app.openChat(g.id, g.id, true));
                                }
                            }
                        });
                    }
                });
            },

            listenCommunities: () => {
                // List Channel Saja
                onSnapshot(doc(db, "users", app.user), (d) => {
                    const list = document.getElementById('list-community'); list.innerHTML="";
                    const data = d.data();
                    if(data && data.groups) {
                        data.groups.forEach(async g => {
                            const gSnap = await getDoc(doc(db, "groups", g.id));
                            if(gSnap.exists()) {
                                const gd = gSnap.data();
                                if(gd.type === 'channel') { // HANYA CHANNEL
                                    app.renderItem(list, gd.name, "Saluran Broadcast", gd.avatar, 'bx-station', () => app.openChat(g.id, g.id, true));
                                }
                            }
                        });
                    }
                });
            },

            renderItem: (container, name, sub, img, iconFallback, onClick) => {
                const div = document.createElement('div'); div.className = 'list-item';
                const iconClass = iconFallback ? iconFallback : 'bx-user';
                const ava = img ? `<img src="${img}">` : `<i class='bx ${iconClass}'></i>`;
                div.innerHTML = `
                    <div class="avatar">${ava}</div>
                    <div class="item-content"><div class="item-name">${name}</div><div class="item-desc">${sub}</div></div>
                `;
                div.onclick = onClick;
                container.appendChild(div);
            },

            // SEARCH USER (Untuk Tab Chat)
            searchUser: async () => {
                const t = document.getElementById('search-chat').value.trim().toLowerCase();
                if(t === app.user) return alert("Email sendiri");
                const snap = await getDoc(doc(db, "users", t));
                if(snap.exists()) {
                    const cid = [app.user, t].sort().join("_");
                    await updateDoc(doc(db, "users", app.user), { chats: arrayUnion({id:t, chatId:cid}) });
                    await updateDoc(doc(db, "users", t), { chats: arrayUnion({id:app.user, chatId:cid}) });
                    app.openChat(cid, t, false);
                    document.getElementById('search-chat').value = "";
                } else alert("User tidak ditemukan");
            },

            // CREATE (Grup / Channel)
            createGroup: async (type) => {
                const idInp = type === 'group' ? 'g-name' : 'c-name';
                const name = document.getElementById(idInp).value;
                if(!name) return;
                
                const gRef = await addDoc(collection(db, "groups"), {
                    name, type, admin:app.user, members:[app.user], avatar:null
                });
                await updateDoc(doc(db, "users", app.user), { groups: arrayUnion({id:gRef.id}) });
                
                app.closeModal('create-group'); app.closeModal('create-channel');
                alert(type === 'group' ? "Grup Dibuat!" : "Saluran Dibuat!");
            },

            // EXPLORE (Cari Channel Publik)
            openModal: (id) => {
                document.getElementById('modal-'+id).classList.remove('hidden');
                if(id==='explore') app.loadExplore();
            },
            closeModal: (id) => document.getElementById('modal-'+id).classList.add('hidden'),
            
            loadExplore: async () => {
                const list = document.getElementById('explore-list'); list.innerHTML = "Loading...";
                // Query semua grup tipe channel
                const q = query(collection(db, "groups"), where("type", "==", "channel"));
                const snap = await getDocs(q);
                list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const div = document.createElement('div'); div.className = 'com-item';
                    div.innerHTML = `
                        <div><b>${d.name}</b><br><span style="font-size:11px;color:#666">${d.members.length} Pengikut</span></div>
                        <button class="com-btn" onclick="app.joinChannel('${doc.id}')">Gabung</button>
                    `;
                    list.appendChild(div);
                });
            },
            joinChannel: async (gid) => {
                await updateDoc(doc(db, "groups", gid), { members: arrayUnion(app.user) });
                await updateDoc(doc(db, "users", app.user), { groups: arrayUnion({id:gid}) });
                alert("Berhasil Gabung!"); app.closeModal('explore');
            },

            // OPEN CHAT
            openChat: async (chatId, titleId, isGrp) => {
                app.chatId = chatId; app.isGrp = isGrp;
                
                document.getElementById('empty-state').classList.add('hidden');
                document.getElementById('active-chat').classList.remove('hidden');
                document.getElementById('chat-room').classList.add('show');

                const nameEl = document.getElementById('head-name');
                const descEl = document.getElementById('head-desc');
                const avaEl = document.getElementById('head-ava');
                const inpBar = document.getElementById('input-bar');
                const roBar = document.getElementById('read-only-bar');

                inpBar.style.display = 'flex'; roBar.classList.add('hidden');

                if(isGrp) {
                    const gSnap = await getDoc(doc(db, "groups", titleId));
                    const g = gSnap.data();
                    nameEl.innerText = g.name;
                    descEl.innerText = g.type === 'channel' ? "Saluran Broadcast" : `${g.members.length} Anggota`;
                    avaEl.innerHTML = g.avatar ? `<img src="${g.avatar}">` : `<i class='bx ${g.type==='channel'?'bx-station':'bx-group'}'></i>`;
                    
                    // Logic Read Only Channel
                    if(g.type === 'channel' && g.admin !== app.user) {
                        inpBar.style.display = 'none'; roBar.classList.remove('hidden');
                    }
                } else {
                    const pSnap = await getDoc(doc(db, "users", titleId));
                    const p = pSnap.data();
                    nameEl.innerText = p.name;
                    descEl.innerText = "Online";
                    avaEl.innerHTML = p.avatar ? `<img src="${p.avatar}">` : `<i class='bx bx-user'></i>`;
                }

                // Messages
                onSnapshot(collection(db, "chats", chatId, "messages"), (snap) => {
                    const area = document.getElementById('msgs-area'); area.innerHTML="";
                    let msgs = []; snap.forEach(d => msgs.push(d.data()));
                    msgs.sort((a,b) => a.time - b.time);
                    
                    msgs.forEach(m => {
                        const me = m.sender === app.user;
                        const d = document.createElement('div'); d.className = `bubble ${me?'me':'other'}`;
                        
                        let sender = (!me && app.isGrp) ? `<span class="sender-name">${m.senderName}</span>` : '';
                        let content = m.img ? `<img src="${m.img}" style="max-width:100%;border-radius:8px">` : `<div>${m.text}</div>`;
                        
                        d.innerHTML = `${sender}${content}<span class="msg-time">${new Date(m.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>`;
                        area.appendChild(d);
                    });
                    area.scrollTop = area.scrollHeight;
                });
            },
            closeChat: () => document.getElementById('chat-room').classList.remove('show'),
            send: async () => {
                const inp = document.getElementById('msg-in'); const txt = inp.value.trim();
                if(!txt || !app.chatId) return;
                const u = await getDoc(doc(db, "users", app.user));
                await addDoc(collection(db, "chats", app.chatId, "messages"), { sender:app.user, senderName:u.data().name, text:txt, time:Date.now() });
                inp.value="";
            },

            // PROFILE
            loadProfile: async () => {
                const s = await getDoc(doc(db, "users", app.user)); const d = s.data();
                document.getElementById('edit-name').value = d.name;
                document.getElementById('edit-bio').value = d.bio;
                document.getElementById('my-ava-big').innerHTML = d.avatar ? `<img src="${d.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : `<i class='bx bx-user'></i>`;
            },
            saveProfile: async () => {
                const name = document.getElementById('edit-name').value;
                const bio = document.getElementById('edit-bio').value;
                const file = document.getElementById('file-p').files[0];
                let data = { name, bio };
                if(file) {
                    const r = new FileReader(); r.readAsDataURL(file);
                    r.onload = async (e) => { data.avatar = e.target.result; await updateDoc(doc(db, "users", app.user), data); alert("Tersimpan"); }
                } else {
                    await updateDoc(doc(db, "users", app.user), data); alert("Tersimpan");
                }
            }
        };

        const saved = localStorage.getItem('rivo_plat_user');
        if(saved) { document.getElementById('email').value = saved; app.login(); }
    </script>
</body>
</html>
